<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <style>
        /* Add your CSS here to match the look of the examples */
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 50px; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <form>
        <h2>User Registration</h2>
        <label>First Name:</label>
        <input type="text" name="fname">
        <label>Second Name:</label>
        <input type="text" name="sname">
        <label>Email:</label>
        <input type="email" name="email">
        <label>Password:</label>
        <input type="password" name="password">
        <button type="submit">Register</button>
    </form>
</body>
</html>
