<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { display: block; margin-bottom: 10px; width: 250px; padding: 5px; }
        button { padding: 5px 15px; cursor: pointer; }
        
        /* The specific styles for your success text */
        #success-area { margin-top: 20px; display: none; }
        .success-header { color: green; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .success-body { font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>User Registration</h1>

    <form id="registrationForm">
        <label>First Name:</label>
        <input type="text" id="fname" required>

        <label>Second Name:</label>
        <input type="text" id="sname" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Password:</label>
        <input type="password" id="password" required>

        <button type="submit">Register</button>
    </form>

    <div id="success-area">
        <div class="success-header">Form submitted successfully!</div>
        <div class="success-body" id="welcome-text"></div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents the page from refreshing

            // Get the names entered by the user
            const firstName = document.getElementById('fname').value;
            const secondName = document.getElementById('sname').value;

            // Show the success area
            const successArea = document.getElementById('success-area');
            const welcomeText = document.getElementById('welcome-text');
            
            successArea.style.display = 'block';
            welcomeText.innerHTML = "Thank you, " + firstName + " " + secondName + ". Your registration has been received.";
        });
    </script>

</body>
</html>
