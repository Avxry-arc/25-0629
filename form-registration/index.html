<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        // 1. Stop the page from trying to send data to a server (which GitHub can't do)
        e.preventDefault();

        // 2. Get the name from the input field to make it feel "real"
        const firstName = document.querySelector('input[name="fname"]').value;

        // 3. Show a success message
        alert("Registration Successful!\n\nWelcome, " + firstName + ". Your account has been created.");

        // 4. Optionally clear the form so it looks like it processed
        this.reset();
    });
</script>
