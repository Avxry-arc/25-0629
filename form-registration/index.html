<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 50px; }
        form { background: white; padding: 20px; border-radius: 8px; max-width: 300px; }
        input { display: block; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>
    <h2>Sign Up</h2>
    <form action="process.php" method="POST">
        <input type="text" name="firstname" placeholder="First Name" required>
        <input type="text" name="secondname" placeholder="Second Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
